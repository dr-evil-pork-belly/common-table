<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Linen background -->
  <rect width="32" height="32" rx="6" fill="#F2EDE4"/>

  <!-- Subtle grain overlay via noise pattern -->
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Terracotta W — clean serif-style strokes -->
  <!-- Left downstroke -->
  <line x1="5" y1="8" x2="9.5" y2="24" stroke="#B85C38" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Left inner upstroke -->
  <line x1="9.5" y1="24" x2="13" y2="14" stroke="#B85C38" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Center downstroke -->
  <line x1="13" y1="14" x2="16" y2="22" stroke="#B85C38" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right inner upstroke -->
  <line x1="16" y1="22" x2="19" y2="14" stroke="#B85C38" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right downstroke -->
  <line x1="19" y1="14" x2="22.5" y2="24" stroke="#B85C38" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right outer upstroke -->
  <line x1="22.5" y1="24" x2="27" y2="8" stroke="#B85C38" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Thin rule beneath — like the site's horizontal rules -->
  <line x1="5" y1="27" x2="27" y2="27" stroke="#B85C38" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
